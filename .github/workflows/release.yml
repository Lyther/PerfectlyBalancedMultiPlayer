name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install mingw (Windows cross-compile)
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build Linux (amd64)
        run: cargo build --release
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp }}

      - name: Build Windows (amd64)
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp target/release/smms artifacts/smms-linux-x86_64
          cp target/x86_64-pc-windows-gnu/release/smms.exe artifacts/smms-windows-x86_64.exe
          strip artifacts/smms-linux-x86_64 2>/dev/null || true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Installation
            - **Linux**: `smms-linux-x86_64` — place in PATH, `chmod +x`
            - **Windows**: `smms-windows-x86_64.exe` — rename to `smms.exe`, place in PATH
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
